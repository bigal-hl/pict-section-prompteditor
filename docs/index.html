<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
		<meta name="description" content="Pict Section PromptEditor v0.1.0 Documentation — Prompt crafting and management section for Pict: typed prompts with segments (context, request, success criteria), curated word list matrices with weights, a {~WordListEntry:Name~} template expression for weighted-random generation, batch generation with zip download, and a pluggable data provider that defaults to in-memory AppData.">

		<title>Pict Section PromptEditor v0.1.0 Documentation</title>

		<!-- KaTeX stylesheet for LaTeX equation rendering -->
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
		<!-- PICT Dynamic View CSS Container -->
		<style id="PICT-CSS"></style>

		<!-- Load the PICT library from jsDelivr CDN -->
		<script src="https://cdn.jsdelivr.net/npm/pict@1/dist/pict.min.js" type="text/javascript"></script>
		<!-- Bootstrap the Application -->
		<script type="text/javascript">
//<![CDATA[
		Pict.safeOnDocumentReady(() => { Pict.safeLoadPictApplication(PictDocuserve, 2)});
//]]>
		</script>
	</head>
	<body>
		<!-- The root container for the Pict application -->
		<div id="Docuserve-Application-Container"></div>

		<!-- Mermaid diagram rendering.  pict-section-content (v0.1.8+) drives
		     initialization with theme: 'base' + themeVariables sourced
		     from --theme-color-* so diagrams follow the active theme. -->
		<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
		<!-- KaTeX for LaTeX equation rendering -->
		<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>
		<!-- Load the Docuserve PICT Application Bundle from jsDelivr CDN -->
		<script src="https://cdn.jsdelivr.net/npm/pict-docuserve@1/dist/pict-docuserve.min.js" type="text/javascript"></script>
	</body>
</html>
